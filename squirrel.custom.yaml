#-----------------#
#    颜色使用说明   #
#-----------------#
# 我们平常一般用到的颜色都是 `RGB` 顺序的，如 `D1635D` 就是 `red: D1 | green: 63 | blue: 5D`
# 而这里面用到的颜色可以有两种表达方式：
# 一种是带透明度的 `ABGR` ，`A` 代码透明度，范围也是从 `00 - FF`，`00` 是透明 `FF` 是不透明；另一种是 `BGR`。
# 那么上面这个颜色在这里面就可以写成 `0x5D63D1` `0xFF5D63D1`

#-----------------#
#     字体说明     #
#-----------------#
# 只要是你本地有的字体就可以，可以打开 FontBook.app 查看
# 一般字体不需要指定，指定后的字体可能会出现候选框被拉伸成过高的情况，因为不同字体的纵向高度不同，默认字体适配最好

patch:
  # ===== 启用青涩系列皮肤 =====
  "style/color_scheme": mint_light_green          # 亮色模式：碧皓青
  "style/color_scheme_dark": mint_dark_green      # 暗黑模式：碧月青
  
  # ===== 候选栏布局 =====
  "style/horizontal": true                        # 横向候选栏
  "style/inline_preedit": true                    # 内嵌预编辑
  "style/candidate_list_layout": linear           # linear | stacked
  "style/text_orientation": horizontal            # horizontal | vertical
  
  # ===== 候选框外观 =====
  "style/corner_radius": 8                        # 候选框圆角
  "style/border_height": 0                        # 边框高度
  "style/border_width": 0                         # 边框宽度
  "style/line_spacing": 6                         # 候选词间距
  "style/spacing": 10                             # 拼音与候选词间距
  "style/base_offset": 0                          # 文字基线调整
  
  # ===== 字体设置 =====
  "style/font_face": "PingFang SC"                # 候选文字字体
  "style/font_point": 18                          # 候选文字字号
  "style/label_font_face": "PingFang SC"          # 序号字体
  "style/label_font_point": 16                    # 序号字号
  "style/comment_font_face": "PingFang SC"        # 注释字体
  "style/comment_font_point": 14                  # 注释字号
  
  # ===== 状态栏设置 =====
  "style/status_message_type": mix                # long | short | mix
  "style/memorize_size": true
  
  # ===== 青涩系列皮肤颜色定义（亮色模式）=====
  "preset_color_schemes/mint_light_green":
    name: "碧皓青 / Mint Light Green"
    author: "Mintimate"
    back_color: 0xEAF4E8                       # 背景色
    border_color: 0x8CC084                     # 边框色
    candidate_text_color: 0x4A5A3F             # 候选词颜色
    hilited_candidate_back_color: 0xA8D08D     # 高亮候选词背景色
    hilited_candidate_text_color: 0xFFFFFF     # 高亮候选词文字色
    hilited_candidate_label_color: 0xFFFFFF    # 高亮候选词序号色
    label_color: 0x8FBC8F                      # 序号颜色
    comment_text_color: 0x8FBC8F               # 注释颜色
    preedit_back_color: 0xEAF4E8               # 编码区背景色
    hilited_text_color: 0x6A9E5D               # 编码区高亮色
  
  # ===== 青涩系列皮肤颜色定义（暗黑模式）=====
  "preset_color_schemes/mint_dark_green":
    name: "碧月青 / Mint Dark Green"
    author: "Mintimate"
    back_color: 0x2A3A2A                       # 背景色
    border_color: 0x4A6A4A                     # 边框色
    candidate_text_color: 0xC8E6C8             # 候选词颜色
    hilited_candidate_back_color: 0x4E8A5E     # 高亮候选词背景色
    hilited_candidate_text_color: 0xFFFFFF     # 高亮候选词文字色
    hilited_candidate_label_color: 0xFFFFFF    # 高亮候选词序号色
    label_color: 0x6A9E5D                      # 序号颜色
    comment_text_color: 0x6A9E5D               # 注释颜色
    preedit_back_color: 0x2A3A2A               # 编码区背景色
    hilited_text_color: 0x8FBC8F               # 编码区高亮色

  # ===== IDE 自动英文模式（可选）=====
  app_options:
    com.jetbrains.intellij:
      ascii_mode: true
    com.microsoft.VSCode:
      ascii_mode: true